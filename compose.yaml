services:

  clip_app:
    build:
      context: ./clip_app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/health').raise_for_status()" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  query_app:
    build:
      context: ./query_app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CLIP_SERVICE_URL=http://clip_app:8000
    env_file:
      - ./.env
    depends_on:
      clip_app:
        condition: service_healthy
